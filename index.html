<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .profile-card {
            background-color: whitesmoke;
            border: 1px solid lightgray;
            border-radius: 8px;
            text-align: center;
            color: dimgray;
            font-family: Arial, sans-serif;
            box-shadow: 2px 2px 10px gray;
        }

        .profile-card h2 {
        color: black;
        font-size: 20px;
        }
        .profile-card p {
            font-size: 10px;
        }

        .image-grid{
            float: right;
            
           
            
        }
        .aboutmebackground{
            background-color: rgb(166, 235, 212);
        }


        .container {
            display: flex;

        }
 /*general settings */       
        .box-1 {
            flex: 1;
            height: 700px;
        }
 /*image */       
        .box-1_image {
            width: 100%;
            height: 100%;
            background-image: url("https://cdn2.hubspot.net/hubfs/3542650/joseph-fraioli-jafbox-sound-interview-blog-1.jpg");
            background-size: cover;
            
        }
 /*texts */       
        .Sound-Designer {
            width: auto;
            height: auto;
            text-align: center;

        }

        .box-2 {
            flex: 1;
            height: 700px;
        }
        
        .box-2_image {
            width: 100%;
            height: 100%;
            background-image: url("https://ggarces.weebly.com/uploads/1/5/1/9/151930746/the-photo-for-website_orig.jpg");
            background-size: cover;
        }  

        .Technical-Sound-Designer{
            width: auto;
            height: auto;
            text-align: center;           

        }

        .box-3 {
            flex: 1;
            height: 700px;
        }

        .box-3_image {
            width: 100%;
            height: 100%;
            background-image: url("https://online.berklee.edu/takenote/wp-content/uploads/2021/08/music-composition-take-note.jpg");
            background-size: cover;
        }

        .Composer {
            width: auto;
            height: auto;
            text-align: center;
        }        
    
        .box-1, .box-2, .box-3 {
            cursor: pointer;
        }

 /*hover transitions and brightness settings  */       

        .box-1_image, .box-2_image,.box-3_image {
            transition: 0.3s;   
        }
        .box-1_image:hover, .box-2_image:hover, .box-3_image:hover {
            filter: brightness(70%);
        }
    </style>
    
</head>
<body>




    <div class="profile-card">
        <h2>Giancarlo Garces</h2>
        <p>Freelance Sound Designer, Technical Audio Designer, Music Composer</p>
        <p>Boston, MA</p>
    
    </div>


    <div class="container">
        <div class="box-1">
            <div class="box-1_image">
            </div>
            <div class="Sound-Designer">Credits</div>
        </div>


        <div class="box-2">
            <div class="box-2_image"></div>
            <div class="Technical-Sound-Designer">About Me</div>
        </div>
        
        <div class="box-3">
            <div class="box-3_image"></div>
            <div class="Composer">Current Highlight Project</div>
        </div>
    </div>


<script>
document.querySelector(".box-1").onclick = function () {
    window.location.href = "Portfolio.html";
};

document.querySelector(".box-2").onclick = function () {
    window.location.href = "AboutMe.html";
};

document.querySelector(".box-3").onclick = function () {
    window.location.href = "CurrentHighlight.html";
};

box1.onmouseover = function () {
    box1.style.filter = "brightness(70%)";
};

box1.onmouseout = function () {
    box1.style.filter = "brightness(100%)";
};

box2.onmouseover = function () {
    box2.style.filter = "brightness(70%)";
};

box2.onmouseout = function () {
    box2.style.filter = "brightness(100%)";
};

box3.onmouseover = function () {
    box3.style.filter = "brightness(70%)";
};

box3.onmouseout = function () {
    box3.style.filter = "brightness(100%)";
};
</script>


</body>
</html>
